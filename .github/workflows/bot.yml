name: 📰 SharesForYou → Facebook Bot

on:
  schedule:
    # Roda a cada hora (UTC). Ajuste conforme necessário.
    - cron: '0 * * * *'
  # Permite rodar manualmente pela aba Actions
  workflow_dispatch:

# ──────────────────────────────────────────────
# Anti-race condition: garante que só uma instância do bot roda por vez.
# Se outra execução estiver em andamento, a nova ESPERA (não cancela).
# ──────────────────────────────────────────────
concurrency:
  group: bot-run
  cancel-in-progress: false

jobs:
  post-news:
    name: Buscar e Publicar Notícia
    runs-on: ubuntu-latest

    # Permissão para fazer commit do arquivo de IDs postados
    permissions:
      contents: write

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎭 Instalar Playwright + Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 🤖 Executar bot
        env:
          SFY_EMAIL:         ${{ secrets.SFY_EMAIL }}
          SFY_PASSWORD:      ${{ secrets.SFY_PASSWORD }}
          FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN:          ${{ secrets.FB_TOKEN }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py

      - name: 💾 Salvar lista de posts publicados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add posted_ids.json || true
          git diff-index --quiet HEAD || git commit -m "chore: atualiza posted_ids [skip ci]"
          git push || true
