name: 🤖 Bot Notícias Facebook

on:
  workflow_dispatch:          # Permite rodar manualmente pelo painel do GitHub (e via Script Google)

concurrency:
  group: bot-facebook-news
  cancel-in-progress: false   # Não cancela o atual, mas evita múltiplos simultâneos se a fila estiver grande

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Necessário para fazer commit do posted_ids.json de volta

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependências Python
        run: pip install -r requirements.txt

      - name: 🌐 Instalar Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: 🤖 Rodar Bot
        env:
          SFY_EMAIL:      ${{ secrets.SFY_EMAIL }}
          SFY_PASSWORD:   ${{ secrets.SFY_PASSWORD }}
          FB_PAGE_ID:     ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN:       ${{ secrets.FB_TOKEN }}
          FB_APP_ID:      ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET:  ${{ secrets.FB_APP_SECRET }}
          FB_USER_TOKEN:  ${{ secrets.FB_USER_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Garante que temos a versão mais recente do main antes de rodar
          git config pull.rebase true
          git branch --set-upstream-to=origin/main main || true
          git pull origin main || true
          python bot.py

      - name: 💾 Salvar estado de posts publicados
        if: always() # Salva mesmo se o bot falhar parcialmente, mas houver mudanças
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adiciona arquivos de estado forçadamente
          git add posted_ids.json last_title.txt 2>/dev/null || true
          
          # Só commita se houver mudanças reais
          if git diff --cached --quiet; then
            echo "ℹ️ Nenhuma mudança de estado para salvar."
          else
            git commit -m "chore: atualizar estado do bot [skip ci]"
            
            # Tenta sincronizar e subir até 3 vezes em caso de conflitos de concorrência
            for i in {1..3}; do
              echo "🔄 Tentativa de push $i..."
              git pull --rebase origin main || true
              if git push origin HEAD:main; then
                echo "✅ Estado salvo com sucesso!"
                exit 0
              fi
              sleep 5
            done
            echo "❌ Falha ao salvar estado após 3 tentativas."
            exit 1
          fi
